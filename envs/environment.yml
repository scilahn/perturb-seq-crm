name: perturb-seq-crm
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - pip
  - jupyterlab
  - ipykernel
  - numpy
  - pandas
  - scipy
  - matplotlib
  - seaborn
  - pip:
    - pertpy>=0.7.0
    - scvi-tools>=1.1.0
    - scanpy>=1.10.0
    - anndata>=0.10.0
    - decoupler>=1.6.0
    - pydeseq2>=0.4.0
    - boto3>=1.34.0
    - gseapy>=1.1.0
    - scrublet>=0.2.3
    - gears>=0.1.0
    - -e ..
